name: Python tests

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          activate-environment: true
          cache: false
      - name: Install project
        run: uv pip install -e .[dev]
      - name: Run tests
        run: uv pytest --maxfail=1 --disable-warnings -v
