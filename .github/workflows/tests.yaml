name: Python tests

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          activate-environment: true
          cache: false
      - name: Install project
        run: uvx pip install -e .[dev]
      - name: Run tests
        run: uvx pytest --maxfail=1 --disable-warnings -v
